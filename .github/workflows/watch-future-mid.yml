name: watch-future-mid

on:
  schedule:
    # 中程 D+8~D+14：每日 3 次（台灣 10:40 / 14:40 / 22:40）
    - cron: "40 2,6,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch future snapshots (D+8~D+14)
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python fetch_snapshot.py --future --days-from 8 --days-to 14

      - name: Commit data
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "snapshot(future-mid): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
