name: watch-future-hot

on:
  schedule:
    # 熱門乘車日（週五＋週日）D+1~D+27：台灣 05~23 時每 10 分鐘
    # UTC 21-23,0-15 = 台灣 05~23；尾數 7 錯開 watch-today 的整 10 分
    - cron: "7,17,27,37,47,57 0-15,21-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch future snapshots (Fri+Sun, D+1~D+27)
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python fetch_snapshot.py --future --weekdays 4,6

      - name: Commit data
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "snapshot(future-hot): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            if ! git pull --rebase; then
              # CSV 由 union merge 自動解；剩下的衝突（state json 整檔改寫）取本輪新值
              git checkout --theirs -- data 2>/dev/null || true
              git add data
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
          done
          git push
