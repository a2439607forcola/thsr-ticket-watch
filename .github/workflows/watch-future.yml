name: watch-future

on:
  schedule:
    # TDX 對 D+1~D+27 一天更新 3 次（台灣 10/16/22 時）
    # UTC 02:20 / 08:20 / 14:20 = 台灣 10:20 / 16:20 / 22:20，留緩衝抓更新後的資料
    - cron: "20 2,8,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch future snapshots (D+1 ~ D+27)
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python fetch_snapshot.py --future

      - name: Rebuild report
        run: python analyze.py

      - name: Commit data
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "snapshot(future): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
