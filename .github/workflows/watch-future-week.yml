name: watch-future-week

on:
  schedule:
    # 近週 D+1~D+7（全部星期）：每小時 :15 一次，並重建統計報告
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch future snapshots (D+1~D+7)
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python fetch_snapshot.py --future --days-from 1 --days-to 7

      - name: Rebuild report
        run: python analyze.py

      - name: Commit data
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "snapshot(future-week): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
