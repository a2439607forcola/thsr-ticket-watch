name: watch-today

on:
  schedule:
    # 台灣 00 時＋06~23 時每 10 分鐘（UTC 16 = 台灣 00；UTC 22,23,0-15 = 台灣 06~23）
    # 台灣 05 時由 watch-dawn 以每分鐘解析度接手，此處不排
    - cron: "*/10 0-16,22-23 * * *"
    # 台灣 01~04 時凌晨冷區降頻為每 20 分鐘（04:45 起 watch-dawn 加密接手）
    - cron: "0,20,40 17-20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch today snapshot
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python fetch_snapshot.py --today

      - name: Commit data
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "snapshot(today): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            if ! git pull --rebase; then
              # CSV 由 union merge 自動解；剩下的衝突（state json 整檔改寫）取本輪新值
              git checkout --theirs -- data 2>/dev/null || true
              git add data
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
          done
          git push
