name: watch-dawn

on:
  schedule:
    # 台灣 04:45（UTC 20:45）啟動，提早排以吸收 Actions cron 漂移
    # job 內部迴圈：每分鐘抓一次當日快照直到台灣 05:50，捕捉凌晨解凍的確切時刻
    - cron: "45 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thsr-data
  cancel-in-progress: false

jobs:
  dawn-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Minute-resolution loop until 05:50 Taipei
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          git config user.name "thsr-watch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 迴圈終點：當日 UTC 21:50 = 台灣 05:50；手動觸發時終點已過就只跑一輪
          end_epoch=$(date -u -d "$(date -u +%Y-%m-%d) 21:50:00" +%s)
          i=0
          while :; do
            python fetch_snapshot.py --today || true
            git add data
            if ! git diff --cached --quiet; then
              git commit -m "snapshot(dawn): $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
              git push || { git pull --rebase && git push; } || true
            fi
            i=$((i+1))
            [ "$(date -u +%s)" -ge "$end_epoch" ] && break
            [ "$i" -ge 70 ] && break
            sleep 55
          done
          echo "dawn loop done after $i fetches"
